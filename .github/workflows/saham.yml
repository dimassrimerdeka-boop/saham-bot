name: Bot Saham Syariah

on:
  schedule:
    - cron: '0 2,3,4,5,6,7,8 * * 1-5'
  workflow_dispatch:

jobs:
  cek-saham:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Jalankan bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python saham_bot.py
